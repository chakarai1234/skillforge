name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: skillforge

jobs:
  # ── Cross-compile for every target ────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — static musl binary
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: skillforge-linux-x86_64
            use_cross: false

          # Linux ARM64 — static musl binary via cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: skillforge-linux-arm64
            use_cross: true

          # macOS Intel — native build on Intel runner
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: skillforge-macos-x86_64
            use_cross: false

          # macOS Apple Silicon — native build on ARM runner
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: skillforge-macos-arm64
            use_cross: false

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: skillforge-windows-x86_64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux x86_64 musl — install musl-tools
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Linux ARM64 musl — install cross
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── Build ──────────────────────────────────────────────────────────────────
      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Unix) ─────────────────────────────────────────────────────────
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          OUT=${{ matrix.artifact_name }}
          cp "$BIN" "$OUT"
          chmod +x "$OUT"
          sha256sum "$OUT" > "$OUT.sha256"
          echo "artifact=$OUT" >> "$GITHUB_OUTPUT"

      # ── Package (Windows) ──────────────────────────────────────────────────────
      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe"
          $out = "${{ matrix.artifact_name }}.exe"
          Copy-Item $bin $out
          $hash = (Get-FileHash $out -Algorithm SHA256).Hash.ToLower()
          "$hash  $out" | Set-Content "$out.sha256"

      # ── Upload artifacts ───────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.exe
            ${{ matrix.artifact_name }}.sha256
            ${{ matrix.artifact_name }}.exe.sha256
          if-no-files-found: ignore
          retention-days: 1

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for changelog generation

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SkillForge CLI ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS (Apple Silicon)
            ```bash
            curl -Lo skillforge https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/skillforge-macos-arm64
            chmod +x skillforge && sudo mv skillforge /usr/local/bin/
            ```

            ### macOS (Intel)
            ```bash
            curl -Lo skillforge https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/skillforge-macos-x86_64
            chmod +x skillforge && sudo mv skillforge /usr/local/bin/
            ```

            ### Linux (x86_64)
            ```bash
            curl -Lo skillforge https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/skillforge-linux-x86_64
            chmod +x skillforge && sudo mv skillforge /usr/local/bin/
            ```

            ### Linux (ARM64)
            ```bash
            curl -Lo skillforge https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/skillforge-linux-arm64
            chmod +x skillforge && sudo mv skillforge /usr/local/bin/
            ```

            ### Windows
            Download `skillforge-windows-x86_64.exe` and add it to your PATH.

            ---
            > Set your AI API key as an environment variable before running:
            > `export ANTHROPIC_API_KEY=sk-ant-...`
          files: dist/**
